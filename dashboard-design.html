<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Tool | Artisan Guitars</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        if (localStorage.getItem('isRTL') === 'true') document.documentElement.setAttribute('dir', 'rtl');
    </script>
</head>
<body>
    
    <div class="dashboard-layout">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="brand-logo" style="font-size: 1.2rem;"><i class="ph-fill ph-guitar"></i> Artisan Guitars</a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link">
                    <i class="ph ph-guitars"></i> My Builds
                </a>
                <a href="dashboard-design.html" class="sidebar-link active">
                    <i class="ph ph-paint-brush"></i> Design Tool
                </a>
                <a href="dashboard-materials.html" class="sidebar-link">
                    <i class="ph ph-tree-evergreen"></i> Materials
                </a>
                <a href="dashboard-orders.html" class="sidebar-link">
                    <i class="ph ph-receipt"></i> Orders
                </a>
                <a href="dashboard-messages.html" class="sidebar-link">
                    <i class="ph ph-chat-text"></i> Messages <span style="background:var(--clr-primary);color:#fff;padding:2px 6px;border-radius:10px;font-size:0.75rem;margin-left:auto;">2</span>
                </a>
                <a href="dashboard-settings.html" class="sidebar-link">
                    <i class="ph ph-gear"></i> Settings
                </a>
            </nav>
            
            <div class="sidebar-footer" style="display:flex; flex-direction:column; gap:0.5rem;">
                <button class="theme-toggle" id="themeToggle" style="width:100%; border-radius:var(--radius-sm); border:1px solid var(--clr-border); justify-content:flex-start; gap:0.5rem; padding-left:1rem; border:none; background:var(--clr-primary-light);">
                    <i class="ph ph-moon"></i> Dark Mode
                </button>
                <button class="logout-btn">
                    <i class="ph ph-sign-out" style="font-size:1.2rem;"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Mobile Top Bar -->
            <div class="dash-mobile-top">
                <button class="dash-menu-toggle" aria-label="Open sidebar"><i class="ph ph-list"></i></button>
                <div class="avatar" style="width:36px; height:36px; font-size:0.9rem;">JD</div>
            </div>

            <header class="dashboard-header">
                <div>
                    <h2>Design Configurator</h2>
                    <p style="margin:0;">Lock in your physical hardware specifics below.</p>
                </div>
                <div class="user-profile-menu desktop-only">
                    <a href="index.html" class="btn btn-outline" style="padding:0.5rem 1rem;">Back to Site</a>
                    <div class="avatar">JD</div>
                </div>
            </header>

            <div class="grid grid-2" style="gap: 2rem;">
                <div class="tracker-card" style="margin: 0;">
                    <h3 style="margin-bottom: 2rem;">Component Layout</h3>
                    <form>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display:block; margin-bottom:0.5rem; font-weight:600;">Neck Profile Shape</label>
                            <select class="form-control" style="width: 100%; padding: 1rem; border: 1px solid var(--clr-border); background: var(--clr-bg); color: var(--clr-text); border-radius: var(--radius-sm);">
                                <option>Modern "C" (Fast, Thin)</option>
                                <option>Vintage "U" (Thick, Baseball Bat)</option>
                                <option>Asymmetrical "D" (Ergonomic)</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display:block; margin-bottom:0.5rem; font-weight:600;">Fretboard Radius</label>
                            <select class="form-control" style="width: 100%; padding: 1rem; border: 1px solid var(--clr-border); background: var(--clr-bg); color: var(--clr-text); border-radius: var(--radius-sm);">
                                <option>9.5" (Classic Chording)</option>
                                <option>12" (Standard Modern)</option>
                                <option>10"-16" Compound (Shredder)</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display:block; margin-bottom:0.5rem; font-weight:600;">Pickup Configuration</label>
                            <select class="form-control" style="width: 100%; padding: 1rem; border: 1px solid var(--clr-border); background: var(--clr-bg); color: var(--clr-text); border-radius: var(--radius-sm);">
                                <option>HH (Dual Humbucker)</option>
                                <option>HSS (Versatile Mix)</option>
                                <option>SSS (Vintage Strat)</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 2rem;">
                            <label style="display:block; margin-bottom:0.5rem; font-weight:600;">Bridge Hardware</label>
                            <select class="form-control" style="width: 100%; padding: 1rem; border: 1px solid var(--clr-border); background: var(--clr-bg); color: var(--clr-text); border-radius: var(--radius-sm);">
                                <option>Hardtail String-Through (Max Sustain)</option>
                                <option>Two-Point Floating Tremolo</option>
                                <option>Original Floyd Rose Locking</option>
                            </select>
                        </div>
                        <button type="button" class="btn btn-primary" style="width: 100%; padding: 1rem;">Save Blueprint</button>
                    </form>
                </div>

                <div class="tracker-card" style="margin: 0; display: flex; flex-direction: column; text-align: center;">
                    <h3 style="margin-bottom: 1rem; text-align: left;">Live Blueprint Render</h3>
                    <div style="flex: 1; min-height: 400px; background: url('assets/gallery_electric.png') center / cover; border-radius: var(--radius-md); position: relative;">
                        <!-- Mock overlay of design changes -->
                        <div style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.8rem;">
                            <i class="ph ph-arrows-clockwise"></i> Auto-Synced
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="js/scripts.js"></script>
</body>
</html>
